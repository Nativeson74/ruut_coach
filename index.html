function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultState()}catch{return defaultState()}}function loadSettings(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY+".settings"))||defaultSettings()}catch{return defaultSettings()}}function defaultState(){return{week:1,dayIndex:1,completed:[],streak:0,totalCompleted:0,lastCompletedKey:""}}function defaultSettings(){return{coachStyle:"trail",voiceURI:"",voiceRate:.95,keepAwake:true}}function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));renderAll()}function saveSettings(){localStorage.setItem(STORAGE_KEY+".settings",JSON.stringify(settings));renderAll()}function currentWeek(){return plan[state.week-1]}function currentWorkout(){return currentWeek().days[state.dayIndex-1]}function currentKey(){return`${state.week}-${state.dayIndex}`}function isComplete(){return state.completed.includes(currentKey())}function progressPercent(){return Math.round(state.completed.length/84*100)}
function showScreen(id,btn){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll()}function renderAll(){renderToday();renderWorkout();renderPlan();renderProgress()}function typePill(t){return`<span class="pill ${t}">${t==="bodyweight"?"strength":t}</span>`}
function renderToday(){let w=currentWeek(),x=currentWorkout(),ex=x.type==="bodyweight"?x.exercises.map(e=>`<div class="exercise"><span>${e.name}</span><strong>${e.mode==="timed"?e.seconds+" sec":e.reps}</strong></div>`).join(""):"";document.getElementById("today").innerHTML=`<section class="card hero"><div class="pill-row"><span class="pill accent">Week ${state.week}</span><span class="pill">Day ${state.dayIndex}</span><span class="pill">${x.day}</span>${typePill(x.type)}</div><div><p class="muted small">${w.theme}</p><h2>${x.title}</h2></div><div class="grid two"><div class="stat"><span class="muted small">Time</span><strong>${x.time}</strong></div><div class="stat"><span class="muted small">Target</span><strong style="font-size:17px">${x.distance}</strong></div></div><div class="detail"><strong>Purpose</strong><p class="muted">${x.purpose}</p></div><div class="grid two"><div class="detail"><strong>Best Route</strong><p class="muted">${x.terrain}</p></div><div class="detail"><strong>Effort</strong><p class="muted">${x.effort}</p></div></div><div class="detail"><strong>Workout Structure</strong><p class="muted">${x.structure}</p></div><div class="grid two"><div class="detail"><strong>Success Today</strong><p class="muted">${x.success}</p></div><div class="detail"><strong>Caution</strong><p class="muted">${x.caution}</p></div></div>${ex?`<div class="list">${ex}</div>`:""}<button onclick="startWorkout()">Start Guided Workout</button><div class="grid two"><button class="secondary" onclick="markComplete(true)">${isComplete()?"Completed":"Mark Complete"}</button><button class="secondary" onclick="nextDay()">Next Day</button></div></section>`}
function renderWorkout(){let x=currentWorkout();document.getElementById("workout").innerHTML=`<section class="card workout-mode"><div><p class="muted small">Guided session</p><div class="cue">${x.title}</div></div><div class="timer" id="timerDisplay">--:--</div><div class="progress-bar"><div id="workoutProgress" class="progress-fill"></div></div><p id="workoutMessage" class="muted">Tap start and keep this screen open during workouts.</p><div class="pill-row" style="justify-content:center"><span class="pill awake"><span id="awakeDot" class="dot"></span><span id="awakeText">Screen awake not active</span></span></div><button onclick="startWorkout()">Start Today's Workout</button><button class="secondary" onclick="stopWorkout()">Stop</button></section>`}
function renderPlan(){document.getElementById("plan").innerHTML=plan.map(w=>{let rows=w.days.map((d,i)=>{let key=`${w.num}-${i+1}`;return`<div class="row"><span>${i+1}. ${d.day} — ${d.title}</span><span class="${state.completed.includes(key)?"complete":"muted"}">${state.completed.includes(key)?"✓":d.type==="bodyweight"?"strength":d.type}</span></div>`}).join("");return`<section class="card"><h3>Week ${w.num}: ${w.theme}</h3><div style="height:10px"></div><div class="list">${rows}</div></section>`}).join("")}
function renderProgress(){document.getElementById("progress").innerHTML=`<section class="card hero"><h2>Progress</h2><div class="progress-bar"><div class="progress-fill" style="width:${progressPercent()}%"></div></div><div class="grid two"><div class="stat"><span class="muted small">Complete</span><strong>${progressPercent()}%</strong></div><div class="stat"><span class="muted small">Streak</span><strong>${state.streak}</strong></div><div class="stat"><span class="muted small">Total</span><strong>${state.totalCompleted}</strong></div><div class="stat"><span class="muted small">Current</span><strong>W${state.week} D${state.dayIndex}</strong></div></div><button class="secondary" onclick="openSettings()">Voice & Settings</button><button class="secondary" onclick="exportProgress()">Export Progress</button><button class="danger" onclick="confirmReset()">Reset Program</button></section>`}
function markComplete(manual=false){let key=currentKey();if(!state.completed.includes(key)){state.completed.push(key);state.streak++;state.totalCompleted++;state.lastCompletedKey=key;if(manual)speak(phrase("finish"));saveState()}}function nextDay(){state.dayIndex++;if(state.dayIndex>7){state.dayIndex=1;state.week++}if(state.week>12){state.week=12;state.dayIndex=7}saveState()}function confirmReset(){showModal(`<h2>Reset Program?</h2><p class="muted" style="margin:12px 0 18px">This clears progress and returns you to Week 1, Day 1.</p><button class="danger" onclick="resetProgram()">Reset</button><div style="height:10px"></div><button class="secondary" onclick="hideModal()">Cancel</button>`)}function resetProgram(){state=defaultState();saveState();hideModal()}function exportProgress(){showModal(`<h2>Progress Data</h2><p class="muted small" style="margin:10px 0">Copy this if you want a backup.</p><textarea>${JSON.stringify(state,null,2)}</textarea><div style="height:10px"></div><button onclick="hideModal()">Done</button>`)}
function openSettings(){populateVoices();let opts=voices.map(v=>`<option value="${v.voiceURI}" ${settings.voiceURI===v.voiceURI?"selected":""}>${v.name} ${v.lang}</option>`).join("");showModal(`<h2>Voice & App Settings</h2><p class="muted" style="margin:10px 0 12px">Choose a coach style and iPhone voice. Available voices depend on your device.</p><label class="small muted">Coach Style</label><select id="coachStyle"><option value="calm" ${settings.coachStyle==="calm"?"selected":""}>Calm Coach</option><option value="tough" ${settings.coachStyle==="tough"?"selected":""}>Tough Love</option><option value="trail" ${settings.coachStyle==="trail"?"selected":""}>Trail Guide</option></select><div style="height:10px"></div><label class="small muted">Voice</label><select id="voiceSelect"><option value="">System Default</option>${opts}</select><div style="height:10px"></div><label class="small muted">Voice Speed</label><select id="voiceRate"><option value="0.85" ${settings.voiceRate==.85?"selected":""}>Slow</option><option value="0.95" ${settings.voiceRate==.95?"selected":""}>Normal</option><option value="1.05" ${settings.voiceRate==1.05?"selected":""}>Brisk</option></select><div style="height:12px"></div><button onclick="saveSettingsFromModal()">Save Settings</button><div style="height:10px"></div><button class="secondary" onclick="testVoice()">Test Voice</button><div style="height:10px"></div><button class="secondary" onclick="hideModal()">Done</button><p class="muted small" style="margin-top:14px">For best reliability during workouts, set iPhone Auto-Lock to Never while training. The app will also try to keep the screen awake when supported.</p>`)}function saveSettingsFromModal(){settings.coachStyle=document.getElementById("coachStyle").value;settings.voiceURI=document.getElementById("voiceSelect").value;settings.voiceRate=parseFloat(document.getElementById("voiceRate").value);saveSettings();speak("Settings saved. Ready when you are.")}function testVoice(){saveSettingsFromModal();speak("This is your RUUT coach. Smooth, steady, and built for the long run.")}
function startWorkout(){stopWorkout();let x=currentWorkout();document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("workout").classList.add("active");document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));document.querySelectorAll("nav button")[1].classList.add("active");renderWorkout();requestWakeLock();if(x.type==="run")startRun(x);else if(x.type==="bodyweight")startStrength(x);else startRest(x)}function startRest(x){setWorkoutMessage("Rest day. Light walking only.");setCue("Rest Day");setTimer("REST");speak("Today is a rest day. Light walking only.")}async function startRun(x){let total=x.total*60,remaining=total,half=Math.floor(total/2),halfSpoken=false;setCue("Starting");setWorkoutMessage(x.structure);speak(phrase("start"));await countdown();while(remaining>0){await runSegment("Run",x.runSeconds,remaining,total);remaining-=x.runSeconds;if(!halfSpoken&&remaining<=half){halfSpoken=true;showHalfway()}if(remaining<=0)break;await runSegment("Walk",x.walkSeconds,remaining,total);remaining-=x.walkSeconds;if(!halfSpoken&&remaining<=half){halfSpoken=true;showHalfway()}}finishWorkout()}async function runSegment(label,seconds,remaining,total){setCue(label.toUpperCase());setWorkoutMessage(label==="Run"?"Stay controlled. Smooth is fast.":"Recover. Keep moving.");speak(label==="Run"?phrase("run"):phrase("walk"));await timer(seconds,remaining,total)}function showHalfway(){setWorkoutMessage("Halfway point. Turn back now.");setCue("TURN BACK");speak(phrase("half"))}
async function startStrength(x){setCue("Strength");setTimer("READY");setWorkoutMessage(`${x.rounds} rounds. ${x.note}`);speak(`Starting bodyweight workout. ${x.rounds} rounds.`);await sleep(1000);for(let r=1;r<=x.rounds;r++){setCue(`Round ${r}`);speak(template(phrase("round"),{n:r,t:x.rounds}));for(const e of x.exercises){setCue(e.name);if(e.mode==="timed"){setWorkoutMessage(`${e.name}. ${e.seconds} seconds.`);speak(template(phrase("timed"),{name:e.name,seconds:e.seconds}));await timer(e.seconds,e.seconds,e.seconds);speak(`${e.name} complete.`)}else{setTimer("DONE?");setWorkoutMessage(`${e.name}. ${e.reps}. Tap Done when finished.`);speak(template(phrase("rep"),{name:e.name,reps:e.reps}));await waitForDone(e.name,e.reps)}}}finishWorkout()}function finishWorkout(){setCue("Complete");setTimer("DONE");setWorkoutMessage("Workout complete. Good work.");speak(phrase("finish"));markComplete(false);releaseWakeLock();showModal(`<h2>Workout Complete</h2><p class="muted" style="margin:10px 0 18px">${currentWorkout().day} — ${currentWorkout().title}</p><button onclick="hideModal();nextDay();">Move to Next Day</button><div style="height:10px"></div><button class="secondary" onclick="hideModal()">Stay Here</button>`)}function waitForDone(name,reps){return new Promise(resolve=>{showModal(`<h2>${name}</h2><p class="muted" style="margin:10px 0 18px">${reps}</p><button onclick="resolveDone()">Done</button>`);window.resolveDone=()=>{hideModal();resolve()}})}async function countdown(){setTimer("3");await sleep(500);setTimer("2");speak("2.");await sleep(1000);setTimer("1");speak("1.");await sleep(1000);setTimer("GO");speak("Go.");await sleep(500)}
function timer(seconds,remainingBefore,total){return new Promise(resolve=>{let left=Math.max(0,seconds);clearInterval(activeTimer);updateTimer(left,remainingBefore,total);activeTimer=setInterval(()=>{left--;updateTimer(left,Math.max(0,remainingBefore-(seconds-left)),total);if(left<=0){clearInterval(activeTimer);activeTimer=null;resolve()}},1000)})}function updateTimer(left,remaining,total){setTimer(formatTime(left));let done=total?((total-remaining)/total)*100:0,bar=document.getElementById("workoutProgress");if(bar)bar.style.width=`${Math.max(0,Math.min(100,done))}%`}function stopWorkout(){clearInterval(activeTimer);activeTimer=null;if(window.speechSynthesis)window.speechSynthesis.cancel();releaseWakeLock();setAwake(false,"Screen awake not active")}async function requestWakeLock(){if(!settings.keepAwake)return;try{if("wakeLock" in navigator){wakeLock=await navigator.wakeLock.request("screen");setAwake(true,"Screen awake active");wakeLock.addEventListener("release",()=>setAwake(false,"Screen awake released"))}else setAwake(false,"Wake lock unsupported")}catch(e){setAwake(false,"Wake lock blocked")}}function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null}setAwake(false,"Screen awake not active")}function setAwake(on,text){let d=document.getElementById("awakeDot"),t=document.getElementById("awakeText");if(d)d.className=on?"dot on":"dot";if(t)t.textContent=text}function setCue(text){let el=document.querySelector("#workout .cue");if(el)el.textContent=text}function setTimer(text){let el=document.getElementById("timerDisplay");if(el)el.textContent=text}function setWorkoutMessage(text){let el=document.getElementById("workoutMessage");if(el)el.textContent=text}
function phrase(key){let bank=P[settings.coachStyle]||P.trail,arr=bank[key]||P.trail[key]||[""];return arr[Math.floor(Math.random()*arr.length)]}function template(s,o){return s.replace(/\{(\w+)\}/g,(_,k)=>o[k]??"")}function populateVoices(){voices=window.speechSynthesis?window.speechSynthesis.getVoices():[]}if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=populateVoices;populateVoices()}function speak(text){if(!("speechSynthesis" in window))return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(text);u.rate=settings.voiceRate||.95;let v=voices.find(x=>x.voiceURI===settings.voiceURI);if(v)u.voice=v;window.speechSynthesis.speak(u)}function sleep(ms){return new Promise(r=>setTimeout(r,ms))}function formatTime(s){if(typeof s!=="number")return s;let m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,"0")}`}function showModal(html){document.getElementById("modalContent").innerHTML=html;document.getElementById("modal").classList.add("active")}function hideModal(){document.getElementById("modal").classList.remove("active")}function closeModal(e){if(e.target.id==="modal")hideModal()}renderAll();
</script>
