<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Run Coach" />
<meta name="theme-color" content="#050914" />
<title>Run Coach</title>
<link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
<div class="app">
<header>
  <div class="brand"><div class="logo">R</div><div><h1>RUUT Coach</h1><p class="muted small">Adaptive personal system</p></div></div>
  <button class="secondary smallbtn" onclick="openSettings()">Settings</button>
</header>
<main id="today" class="screen active"></main>
<main id="workout" class="screen"></main>
<main id="dashboard" class="screen"></main>
<main id="plan" class="screen"></main>
<main id="journal" class="screen"></main>
<main id="recover" class="screen"></main>
<nav>
  <button class="active" onclick="showScreen('today',this)">Today</button>
  <button onclick="showScreen('workout',this)">Workout</button>
  <button onclick="showScreen('dashboard',this)">Stats</button>
  <button onclick="showScreen('plan',this)">Plan</button>
  <button onclick="showScreen('journal',this)">Journal</button>
  <button onclick="showScreen('recover',this)">Recover</button>
</nav>
</div>
<div id="modal" class="modal" onclick="closeModal(event)"><div class="card" onclick="event.stopPropagation()"><div id="modalContent"></div></div></div>

<script src="./assets/js/app.js" defer></script>
</body>
</html>
