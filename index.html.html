<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#07101f" />
  <title>RUUT Personal Coach</title>
  <style>
    :root {
      --bg: #07101f;
      --panel: #101b2f;
      --panel2: #15233b;
      --text: #f4f7fb;
      --muted: #9aa8bd;
      --accent: #63e6be;
      --accent2: #7aa2ff;
      --danger: #ff6b6b;
      --warn: #ffd166;
      --line: rgba(255,255,255,0.1);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #173055 0, #07101f 45%, #050914 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px 0 22px;
    }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 44px; height: 44px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center; color: #06101f; font-weight: 900;
      box-shadow: var(--shadow);
    }
    h1,h2,h3,p { margin:0; }
    h1 { font-size:22px; letter-spacing:-0.02em; }
    h2 { font-size:25px; letter-spacing:-0.03em; }
    h3 { font-size:17px; }
    .muted { color: var(--muted); }
    .small { font-size:13px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .hero { display:grid; gap:16px; }
    .pill-row { display:flex; flex-wrap:wrap; gap:8px; }
    .pill {
      padding:7px 10px; border-radius:999px;
      background: rgba(255,255,255,0.08); border:1px solid var(--line);
      color: var(--muted); font-size:13px;
    }
    .pill.accent { color:#07101f; background:var(--accent); border-color:transparent; font-weight:700; }
    .grid { display:grid; gap:12px; }
    .grid.two { grid-template-columns:1fr 1fr; }
    .stat {
      background: rgba(255,255,255,0.055);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .stat strong { display:block; font-size:22px; }
    button {
      border:0; border-radius:18px; padding:15px 16px;
      font-size:16px; font-weight:800; color:#07101f; background:var(--accent);
      cursor:pointer; width:100%;
    }
    button.secondary { background:rgba(255,255,255,0.08); color:var(--text); border:1px solid var(--line); }
    button.danger { background:rgba(255,107,107,0.15); color:#ffb3b3; border:1px solid rgba(255,107,107,0.35); }
    nav {
      position: sticky; bottom:12px; display:grid; grid-template-columns:repeat(4,1fr);
      gap:8px; background:rgba(8,15,30,0.78); backdrop-filter:blur(20px);
      border:1px solid var(--line); border-radius:24px; padding:8px; margin-top:auto; z-index:10;
    }
    nav button {
      background:transparent; color:var(--muted); border:0; padding:10px 4px;
      border-radius:16px; font-size:12px; font-weight:800;
    }
    nav button.active { background:rgba(99,230,190,0.18); color:var(--accent); }
    .screen { display:none; gap:14px; }
    .screen.active { display:grid; }
    .exercise {
      display:flex; justify-content:space-between; align-items:center;
      padding:13px 0; border-bottom:1px solid var(--line); gap:12px;
    }
    .exercise:last-child { border-bottom:0; }
    .workout-mode { text-align:center; padding:24px 18px; display:grid; gap:20px; }
    .timer {
      font-size:76px; line-height:0.95; letter-spacing:-0.08em;
      font-weight:900; font-variant-numeric:tabular-nums;
    }
    .cue { font-size:38px; font-weight:900; letter-spacing:-0.04em; }
    .progress-bar {
      height:12px; background:rgba(255,255,255,0.08);
      border-radius:999px; overflow:hidden; border:1px solid var(--line);
    }
    .progress-fill {
      height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
      width:0%; transition:width 0.4s ease;
    }
    .list { display:grid; gap:8px; }
    .row {
      display:flex; justify-content:space-between; align-items:center; padding:12px;
      background:rgba(255,255,255,0.045); border:1px solid var(--line);
      border-radius:16px; gap:12px;
    }
    .complete { color:var(--accent); font-weight:900; }
    .modal {
      position:fixed; inset:0; background:rgba(0,0,0,0.72);
      display:none; place-items:center; padding:18px; z-index:100;
    }
    .modal.active { display:grid; }
    .modal .card { width:100%; max-width:460px; }
    textarea { width:100%; height:220px; border-radius:14px; padding:12px; background:#07101f; color:white; border:1px solid var(--line); }
    @media (max-width:380px) { .timer{font-size:62px;} .cue{font-size:31px;} h2{font-size:22px;} }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">R</div>
        <div><h1>RUUT Coach</h1><p class="muted small">Personal 12-week system</p></div>
      </div>
      <button class="secondary" style="width:auto;padding:10px 12px;font-size:13px" onclick="openInstallHelp()">Install</button>
    </header>
    <main id="today" class="screen active"></main>
    <main id="workout" class="screen"></main>
    <main id="plan" class="screen"></main>
    <main id="progress" class="screen"></main>
    <nav>
      <button class="active" onclick="showScreen('today', this)">Today</button>
      <button onclick="showScreen('workout', this)">Workout</button>
      <button onclick="showScreen('plan', this)">Plan</button>
      <button onclick="showScreen('progress', this)">Progress</button>
    </nav>
  </div>
  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="card" onclick="event.stopPropagation()"><div id="modalContent"></div></div>
  </div>
<script>
const STORAGE_KEY = "ruutPersonalCoach.v1";
let state = loadState();
let activeTimer = null;
let speechEnabled = true;

const plan = [
  week(1, "Control & Rhythm", [
    run("Mon", "Easy Base Run", "25 min", "1 min run / 2 min walk", "1.5–2 miles", 25, 60, 120, "Flat park preferred. Easy breathing."),
    strength("Tue", 3, [rep("Squats", "15 reps"), rep("Pushups", "20 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 30), rep("Glute bridges", "12 reps")], "Baseline strength day. Move clean, not fast."),
    run("Wed", "Light Intervals", "20 min", "30 sec run / 90 sec walk", "1–1.5 miles", 20, 30, 90, "Quick but relaxed. No sprinting."),
    strength("Thu", 3, [rep("Squats", "15 reps"), rep("Pushups", "20 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 30), rep("Glute bridges", "12 reps")], "Repeat baseline. Keep reps clean."),
    run("Fri", "Steady Effort", "25 min", "90 sec run / 90 sec walk", "1.5–2 miles", 25, 90, 90, "Controlled effort."),
    run("Sat", "Long Run", "35 min", "1 min run / 2 min walk", "2–2.5 miles", 35, 60, 120, "Walk hills if needed."),
    rest("Sun")
  ]),
  week(2, "Slight Progression", [
    run("Mon", "Easy Base Run", "28 min", "1 min run / 90 sec walk", "1.75–2.25 miles", 28, 60, 90, "Stay disciplined."),
    strength("Tue", 3, [rep("Squats", "16 reps"), rep("Pushups", "21 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "14 reps")], "Small progression. Do not rush."),
    run("Wed", "Intervals", "22 min", "45 sec run / 90 sec walk", "1.25–1.75 miles", 22, 45, 90, "Smooth and controlled."),
    strength("Thu", 3, [rep("Squats", "16 reps"), rep("Pushups", "21 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "14 reps")], "Build the habit."),
    run("Fri", "Steady Effort", "28 min", "2 min run / 90 sec walk", "1.75–2.25 miles", 28, 120, 90, "Relax shoulders."),
    run("Sat", "Long Run", "40 min", "1 min run / 2 min walk", "2.5–3 miles", 40, 60, 120, "Time on feet matters."),
    rest("Sun")
  ]),
  week(3, "Build the Engine", [
    run("Mon", "Easy Run", "30 min", "2 min run / 90 sec walk", "2–2.5 miles", 30, 120, 90, "Easy effort."),
    strength("Tue", 3, [rep("Squats", "18 reps"), rep("Pushups", "22 reps"), rep("Lunges", "11 reps per leg"), timed("Plank", 40), rep("Glute bridges", "15 reps")], "More work, same clean form."),
    run("Wed", "Hill/Interval Day", "25 min", "1 min strong / 2 min easy", "1.5–2 miles", 25, 60, 120, "Trail hills allowed."),
    strength("Thu", 3, [rep("Squats", "18 reps"), rep("Pushups", "22 reps"), rep("Lunges", "11 reps per leg"), timed("Plank", 40), rep("Glute bridges", "15 reps")], "Stay smooth."),
    run("Fri", "Steady Run", "30 min", "3 min run / 90 sec walk", "2–2.75 miles", 30, 180, 90, "Do not chase pace."),
    run("Sat", "Long Run", "45 min", "2 min run / 2 min walk", "3–3.5 miles", 45, 120, 120, "Stay patient."),
    rest("Sun")
  ]),
  week(4, "Recovery Week", [
    run("Mon", "Easy Reset", "25 min", "1 min run / 2 min walk", "1.5–2 miles", 25, 60, 120, "Keep it light."),
    strength("Tue", 2, [rep("Squats", "15 reps"), rep("Pushups", "18 reps"), rep("Reverse lunges", "8 reps per leg"), timed("Plank", 30), rep("Glute bridges", "12 reps")], "Recovery strength. Leave energy in the tank."),
    run("Wed", "Light Intervals", "20 min", "30 sec run / 90 sec walk", "1–1.5 miles", 20, 30, 90, "No hard pushing."),
    strength("Thu", 2, [rep("Squats", "15 reps"), rep("Pushups", "18 reps"), rep("Reverse lunges", "8 reps per leg"), timed("Plank", 30), rep("Glute bridges", "12 reps")], "Easy movement only."),
    run("Fri", "Easy Run", "25 min", "2 min run / 2 min walk", "1.5–2 miles", 25, 120, 120, "Recovery matters."),
    run("Sat", "Long Easy Run", "40 min", "1 min run / 2 min walk", "2.5–3 miles", 40, 60, 120, "Comfortable only."),
    rest("Sun")
  ]),
  week(5, "Capacity Build", [
    run("Mon", "Easy Run", "35 min", "3 min run / 90 sec walk", "2.5–3 miles", 35, 180, 90, "Flat route preferred."),
    strength("Tue", 4, [rep("Squats", "15 reps"), rep("Pushups", "18 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "15 reps")], "New challenge: 4 rounds."),
    run("Wed", "Intervals", "30 min", "1 min strong / 2 min easy", "2–2.5 miles", 30, 60, 120, "Controlled hard."),
    strength("Thu", 4, [rep("Squats", "15 reps"), rep("Pushups", "18 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "15 reps")], "Control each rep."),
    run("Fri", "Tempo Intro", "30 min", "5 min easy / walk as needed", "2.5–3 miles", 30, 300, 90, "Steady, not gasping."),
    run("Sat", "Long Run", "55 min", "3 min run / 2 min walk", "4–4.5 miles", 55, 180, 120, "Use fuel/water if needed."),
    rest("Sun")
  ]),
  week(6, "Longer Blocks", [
    run("Mon", "Easy Run", "35 min", "5 min run / 2 min walk", "3 miles", 35, 300, 120, "Smooth rhythm."),
    strength("Tue", 4, [rep("Squats", "17 reps"), rep("Pushups", "20 reps"), rep("Lunges", "11 reps per leg"), timed("Plank", 40), rep("Glute bridges", "16 reps")], "Strength endurance."),
    run("Wed", "Hill Strength", "30 min", "Run hills easy / walk recovery", "2–2.75 miles", 30, 120, 120, "Trails are good today."),
    strength("Thu", 4, [rep("Squats", "17 reps"), rep("Pushups", "20 reps"), rep("Lunges", "11 reps per leg"), timed("Plank", 40), rep("Glute bridges", "16 reps")], "Quality over speed."),
    run("Fri", "Steady Run", "35 min", "8 min run / 2 min walk", "3–3.5 miles", 35, 480, 120, "Controlled pace."),
    run("Sat", "Long Run", "65 min", "5 min run / 2 min walk", "5–5.5 miles", 65, 300, 120, "Do not start fast."),
    rest("Sun")
  ]),
  week(7, "Endurance Builder", [
    run("Mon", "Easy Run", "40 min", "8 min run / 2 min walk", "3.5–4 miles", 40, 480, 120, "Relax and build."),
    strength("Tue", 4, [rep("Tempo squats", "18 reps, slow lower"), rep("Pushups", "22 reps"), rep("Reverse lunges", "12 reps per leg"), timed("Plank", 45), rep("Glute bridges", "18 reps")], "Add control. Slow reps build strength."),
    run("Wed", "Intervals", "32 min", "2 min strong / 2 min easy", "2.5–3 miles", 32, 120, 120, "Strong but not reckless."),
    strength("Thu", 4, [rep("Tempo squats", "18 reps, slow lower"), rep("Pushups", "22 reps"), rep("Reverse lunges", "12 reps per leg"), timed("Plank", 45), rep("Glute bridges", "18 reps")], "Stay tight through the core."),
    run("Fri", "Tempo Run", "35 min", "10 min easy / 15 min steady / cool down", "3–3.75 miles", 35, 600, 120, "Steady pressure."),
    run("Sat", "Long Run", "75 min", "8 min run / 2 min walk", "6–6.5 miles", 75, 480, 120, "This is the big builder."),
    rest("Sun")
  ]),
  week(8, "Recovery & Reset", [
    run("Mon", "Easy Run", "30 min", "5 min run / 2 min walk", "2.5–3 miles", 30, 300, 120, "Light and easy."),
    strength("Tue", 3, [rep("Squats", "16 reps"), rep("Pushups", "18 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "14 reps")], "Deload week. Move well."),
    run("Wed", "Light Intervals", "25 min", "1 min run / 2 min walk", "1.75–2.25 miles", 25, 60, 120, "Keep legs fresh."),
    strength("Thu", 3, [rep("Squats", "16 reps"), rep("Pushups", "18 reps"), rep("Lunges", "10 reps per leg"), timed("Plank", 35), rep("Glute bridges", "14 reps")], "Do not chase fatigue."),
    run("Fri", "Easy Run", "30 min", "5 min run / 2 min walk", "2.5–3 miles", 30, 300, 120, "No ego."),
    run("Sat", "Long Easy Run", "60 min", "5 min run / 2 min walk", "4.5–5 miles", 60, 300, 120, "Recovery long run."),
    rest("Sun")
  ]),
  week(9, "Real Endurance", [
    run("Mon", "Easy Run", "45 min", "10 min run / 2 min walk", "4 miles", 45, 600, 120, "Flat if possible."),
    strength("Tue", 4, [rep("Squats", "20 reps"), rep("Pushups", "24 reps"), rep("Lunges", "13 reps per leg"), timed("Plank", 50), rep("Glute bridges", "20 reps")], "Build work capacity."),
    run("Wed", "Intervals", "35 min", "3 min strong / 2 min easy", "3–3.5 miles", 35, 180, 120, "Controlled breathing."),
    strength("Thu", 4, [rep("Squats", "20 reps"), rep("Pushups", "24 reps"), rep("Lunges", "13 reps per leg"), timed("Plank", 50), rep("Glute bridges", "20 reps")], "Strong and controlled."),
    run("Fri", "Tempo Run", "40 min", "10 easy / 20 steady / cool down", "3.75–4.5 miles", 40, 600, 120, "Comfortably hard."),
    run("Sat", "Long Run", "90 min", "10 min run / 2 min walk", "7.5–8 miles", 90, 600, 120, "Bring water."),
    rest("Sun")
  ]),
  week(10, "Peak Build", [
    run("Mon", "Easy Run", "45 min", "12 min run / 2 min walk", "4–4.5 miles", 45, 720, 120, "Stay smooth."),
    strength("Tue", 5, [rep("Squats", "18 reps"), rep("Pushups", "22 reps"), rep("Reverse lunges", "12 reps per leg"), timed("Plank", 45), rep("Glute bridges", "18 reps")], "Five rounds. Pace yourself."),
    run("Wed", "Hill/Interval Mix", "38 min", "4 min strong / 2 min easy", "3.25–4 miles", 38, 240, 120, "Use effort, not speed."),
    strength("Thu", 5, [rep("Squats", "18 reps"), rep("Pushups", "22 reps"), rep("Reverse lunges", "12 reps per leg"), timed("Plank", 45), rep("Glute bridges", "18 reps")], "This is work capacity, not punishment."),
    run("Fri", "Steady Run", "45 min", "15 min run / 2 min walk", "4.5–5 miles", 45, 900, 120, "Controlled grind."),
    run("Sat", "Long Run", "105 min", "12 min run / 2 min walk", "9–9.5 miles", 105, 720, 120, "Slow early, steady late."),
    rest("Sun")
  ]),
  week(11, "Peak Confidence", [
    run("Mon", "Easy Run", "40 min", "10 min run / 2 min walk", "3.5–4 miles", 40, 600, 120, "Save your legs."),
    strength("Tue", 5, [rep("Squats", "20 reps"), rep("Pushups", "25 reps"), rep("Lunges", "14 reps per leg"), timed("Plank", 60), rep("Glute bridges", "20 reps")], "Peak strength endurance."),
    run("Wed", "Moderate Intervals", "32 min", "2 min strong / 2 min easy", "2.5–3 miles", 32, 120, 120, "Sharp, not exhausting."),
    strength("Thu", 4, [rep("Squats", "18 reps"), rep("Pushups", "22 reps"), rep("Lunges", "12 reps per leg"), timed("Plank", 45), rep("Glute bridges", "18 reps")], "Slightly lighter before long run."),
    run("Fri", "Easy Steady Run", "35 min", "10 min run / 2 min walk", "3–3.5 miles", 35, 600, 120, "Keep it light."),
    run("Sat", "Long Run", "120 min max", "15 min run / 2 min walk", "10–11 miles", 120, 900, 120, "Confidence run. Do not race it."),
    rest("Sun")
  ]),
  week(12, "13-Mile Effort", [
    run("Mon", "Easy Shakeout", "30 min", "5 min run / 2 min walk", "2.5–3 miles", 30, 300, 120, "Easy only."),
    strength("Tue", 2, [rep("Squats", "12 reps"), rep("Pushups", "12 reps"), rep("Reverse lunges", "8 reps per leg"), timed("Plank", 30), rep("Glute bridges", "12 reps")], "Taper strength. Stay fresh."),
    run("Wed", "Light Shakeout", "20 min", "2 min run / 2 min walk", "1.5–2 miles", 20, 120, 120, "Stay fresh."),
    rest("Thu"), rest("Fri"),
    run("Sat", "13-Mile Effort", "Finish-focused", "Run/walk allowed", "13 miles", 180, 900, 120, "Start slow. Finish proud."),
    rest("Sun")
  ])
];

function week(num, theme, days) { return { num, theme, days }; }
function run(day, title, time, structure, distance, total, runSeconds, walkSeconds, note) { return { type:"run", day,title,time,structure,distance,total,runSeconds,walkSeconds,note }; }
function strength(day, rounds, exercises, note) { return { type:"bodyweight", day, title:"Bodyweight Strength", time:`${rounds} rounds`, structure:`${rounds} rounds of progressive bodyweight work`, distance:"No running", rounds, exercises, note }; }
function rest(day) { return { type:"rest", day, title:"Rest Day", time:"Rest", structure:"Light walking only", distance:"No target", total:20, runSeconds:0, walkSeconds:60, note:"Recover so the next workout works." }; }
function rep(name, reps) { return { mode:"reps", name, reps, seconds:0 }; }
function timed(name, seconds) { return { mode:"timed", name, reps:"", seconds }; }

function loadState(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState(); } catch { return defaultState(); } }
function defaultState(){ return { week:1, dayIndex:1, completed:[], streak:0, totalCompleted:0, lastCompletedKey:"" }; }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); renderAll(); }
function currentWeek(){ return plan[state.week-1]; }
function currentWorkout(){ return currentWeek().days[state.dayIndex-1]; }
function currentKey(){ return `${state.week}-${state.dayIndex}`; }
function isComplete(){ return state.completed.includes(currentKey()); }
function progressPercent(){ return Math.round((state.completed.length/84)*100); }

function showScreen(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll(){ renderToday(); renderWorkout(); renderPlan(); renderProgress(); }

function renderToday(){
  const w=currentWeek(), workout=currentWorkout();
  const exercises = workout.type==="bodyweight" ? workout.exercises.map(e=>`<div class="exercise"><span>${e.name}</span><strong>${e.mode==='timed'?e.seconds+' sec':e.reps}</strong></div>`).join('') : '';
  document.getElementById('today').innerHTML = `
    <section class="card hero">
      <div class="pill-row"><span class="pill accent">Week ${state.week}</span><span class="pill">Day ${state.dayIndex}</span><span class="pill">${workout.day}</span><span class="pill">${workout.type}</span></div>
      <div><p class="muted small">${w.theme}</p><h2>${workout.title}</h2></div>
      <div class="grid two"><div class="stat"><span class="muted small">Time</span><strong>${workout.time}</strong></div><div class="stat"><span class="muted small">Target</span><strong style="font-size:17px">${workout.distance}</strong></div></div>
      <p class="muted">${workout.structure}</p><p>${workout.note}</p>
      ${exercises ? `<div class="list">${exercises}</div>` : ''}
      <button onclick="startWorkout()">Start Workout</button>
      <div class="grid two"><button class="secondary" onclick="markComplete()">${isComplete()?'Completed':'Mark Complete'}</button><button class="secondary" onclick="nextDay()">Next Day</button></div>
    </section>`;
}

function renderWorkout(){
  document.getElementById('workout').innerHTML = `
    <section class="card workout-mode">
      <div><p class="muted small">Ready when you are</p><div class="cue">${currentWorkout().title}</div></div>
      <div class="timer" id="timerDisplay">--:--</div>
      <div class="progress-bar"><div id="workoutProgress" class="progress-fill"></div></div>
      <p id="workoutMessage" class="muted">Tap start to begin today's guided workout.</p>
      <button onclick="startWorkout()">Start Today's Workout</button>
      <button class="secondary" onclick="stopWorkout()">Stop</button>
    </section>`;
}

function renderPlan(){
  document.getElementById('plan').innerHTML = plan.map(w=>{
    const rows = w.days.map((d,idx)=>{
      const key = `${w.num}-${idx+1}`;
      return `<div class="row"><span>${idx+1}. ${d.day} — ${d.title}</span><span class="${state.completed.includes(key)?'complete':'muted'}">${state.completed.includes(key)?'✓':d.type}</span></div>`;
    }).join('');
    return `<section class="card"><h3>Week ${w.num}: ${w.theme}</h3><div style="height:10px"></div><div class="list">${rows}</div></section>`;
  }).join('');
}

function renderProgress(){
  document.getElementById('progress').innerHTML = `
    <section class="card hero">
      <h2>Progress</h2><div class="progress-bar"><div class="progress-fill" style="width:${progressPercent()}%"></div></div>
      <div class="grid two">
        <div class="stat"><span class="muted small">Complete</span><strong>${progressPercent()}%</strong></div>
        <div class="stat"><span class="muted small">Streak</span><strong>${state.streak}</strong></div>
        <div class="stat"><span class="muted small">Total</span><strong>${state.totalCompleted}</strong></div>
        <div class="stat"><span class="muted small">Current</span><strong>W${state.week} D${state.dayIndex}</strong></div>
      </div>
      <button class="secondary" onclick="exportProgress()">Export Progress</button>
      <button class="danger" onclick="confirmReset()">Reset Program</button>
    </section>`;
}

function markComplete(){
  const key = currentKey();
  if(!state.completed.includes(key)){
    state.completed.push(key);
    state.streak += 1;
    state.totalCompleted += 1;
    state.lastCompletedKey = key;
    speak("Workout complete. Good work.");
    saveState();
  }
}

function nextDay(){
  state.dayIndex += 1;
  if(state.dayIndex > 7){ state.dayIndex=1; state.week += 1; }
  if(state.week > 12){ state.week=12; state.dayIndex=7; }
  saveState();
}

function confirmReset(){
  showModal(`<h2>Reset Program?</h2><p class="muted" style="margin:12px 0 18px">This clears progress and returns you to Week 1, Day 1.</p><button class="danger" onclick="resetProgram()">Reset</button><div style="height:10px"></div><button class="secondary" onclick="hideModal()">Cancel</button>`);
}
function resetProgram(){ state=defaultState(); saveState(); hideModal(); }
function exportProgress(){ showModal(`<h2>Progress Data</h2><p class="muted small" style="margin:10px 0">Copy this if you want a backup.</p><textarea>${JSON.stringify(state,null,2)}</textarea><div style="height:10px"></div><button onclick="hideModal()">Done</button>`); }

function startWorkout(){
  stopWorkout();
  const workout=currentWorkout();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('workout').classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('nav button')[1].classList.add('active');
  renderWorkout();
  if(workout.type==='run') startRun(workout);
  else if(workout.type==='bodyweight') startStrength(workout);
  else startRest(workout);
}
function startRest(workout){ setWorkoutMessage("Rest day. Light walking only."); setCue("Rest Day"); setTimer("REST"); speak("Today is a rest day. Light walking only."); }

async function startRun(workout){
  const totalSeconds = workout.total * 60;
  let remaining = totalSeconds;
  const halfway = Math.floor(totalSeconds/2);
  let halfwaySpoken=false;
  setCue("Starting"); setWorkoutMessage(workout.structure);
  await countdown();
  while(remaining > 0){
    await runSegment("Run", workout.runSeconds, remaining, totalSeconds);
    remaining -= workout.runSeconds;
    if(!halfwaySpoken && remaining <= halfway){ halfwaySpoken=true; speak("Halfway. Turn back now."); }
    if(remaining <= 0) break;
    await runSegment("Walk", workout.walkSeconds, remaining, totalSeconds);
    remaining -= workout.walkSeconds;
    if(!halfwaySpoken && remaining <= halfway){ halfwaySpoken=true; speak("Halfway. Turn back now."); }
  }
  finishWorkout();
}
async function runSegment(label, seconds, remaining, totalSeconds){
  setCue(label.toUpperCase());
  setWorkoutMessage(label==="Run" ? "Stay controlled." : "Recover. Keep moving.");
  speak(label==="Run" ? "Start running." : "Start walking.");
  await timer(seconds, remaining, totalSeconds);
}

async function startStrength(workout){
  setCue("Strength"); setTimer("READY"); setWorkoutMessage(`${workout.rounds} rounds. ${workout.note}`);
  speak(`Starting bodyweight workout. ${workout.rounds} rounds.`);
  await sleep(1000);
  for(let round=1; round<=workout.rounds; round++){
    setCue(`Round ${round}`);
    speak(`Round ${round} of ${workout.rounds}.`);
    for(const exercise of workout.exercises){
      setCue(exercise.name);
      if(exercise.mode==="timed"){
        setWorkoutMessage(`${exercise.name}. ${exercise.seconds} seconds.`);
        speak(`${exercise.name}. ${exercise.seconds} seconds. Starting now.`);
        await timer(exercise.seconds, exercise.seconds, exercise.seconds);
        speak(`${exercise.name} complete.`);
      } else {
        setTimer("DONE?");
        setWorkoutMessage(`${exercise.name}. ${exercise.reps}. Tap Done when finished.`);
        speak(`${exercise.name}. ${exercise.reps}.`);
        await waitForDone(exercise.name, exercise.reps);
      }
    }
  }
  finishWorkout();
}

function finishWorkout(){
  setCue("Complete"); setTimer("DONE"); setWorkoutMessage("Workout complete. Good work.");
  markComplete();
  showModal(`<h2>Workout Complete</h2><p class="muted" style="margin:10px 0 18px">${currentWorkout().day} — ${currentWorkout().title}</p><button onclick="hideModal(); nextDay();">Move to Next Day</button><div style="height:10px"></div><button class="secondary" onclick="hideModal()">Stay Here</button>`);
}

function waitForDone(name,reps){
  return new Promise(resolve=>{
    showModal(`<h2>${name}</h2><p class="muted" style="margin:10px 0 18px">${reps}</p><button onclick="resolveDone()">Done</button>`);
    window.resolveDone=()=>{ hideModal(); resolve(); };
  });
}

async function countdown(){ setTimer("3"); speak("Starting in 3."); await sleep(1000); setTimer("2"); speak("2."); await sleep(1000); setTimer("1"); speak("1."); await sleep(1000); setTimer("GO"); speak("Go."); await sleep(500); }
function timer(seconds, remainingBefore, total){
  return new Promise(resolve=>{
    let left=Math.max(0,seconds);
    clearInterval(activeTimer);
    updateTimer(left, remainingBefore, total);
    activeTimer=setInterval(()=>{
      left-=1;
      updateTimer(left, Math.max(0, remainingBefore-(seconds-left)), total);
      if(left<=0){ clearInterval(activeTimer); activeTimer=null; resolve(); }
    },1000);
  });
}
function updateTimer(left, remaining, total){
  setTimer(formatTime(left));
  const done = total ? ((total-remaining)/total)*100 : 0;
  const bar=document.getElementById('workoutProgress');
  if(bar) bar.style.width=`${Math.max(0,Math.min(100,done))}%`;
}
function stopWorkout(){ clearInterval(activeTimer); activeTimer=null; if(window.speechSynthesis) window.speechSynthesis.cancel(); }
function setCue(text){ const el=document.querySelector('#workout .cue'); if(el) el.textContent=text; }
function setTimer(text){ const el=document.getElementById('timerDisplay'); if(el) el.textContent=text; }
function setWorkoutMessage(text){ const el=document.getElementById('workoutMessage'); if(el) el.textContent=text; }
function speak(text){
  if(!speechEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95; u.pitch=1;
  window.speechSynthesis.speak(u);
}
function sleep(ms){ return new Promise(resolve=>setTimeout(resolve,ms)); }
function formatTime(seconds){ if(typeof seconds!=='number') return seconds; const m=Math.floor(seconds/60); const s=seconds%60; return `${m}:${String(s).padStart(2,'0')}`; }
function showModal(html){ document.getElementById('modalContent').innerHTML=html; document.getElementById('modal').classList.add('active'); }
function hideModal(){ document.getElementById('modal').classList.remove('active'); }
function closeModal(e){ if(e.target.id==='modal') hideModal(); }
function openInstallHelp(){ showModal(`<h2>Add to Home Screen</h2><p class="muted" style="margin:12px 0">On iPhone Safari: tap Share, then tap Add to Home Screen.</p><p class="muted">For best results, keep your iPhone awake during active timers.</p><div style="height:14px"></div><button onclick="hideModal()">Got it</button>`); }
renderAll();
</script>
</body>
